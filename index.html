<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Java App - Download</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Get My Java App</h1>
        <p>A powerful desktop application built for performance.</p>
    </header>

    <main class="download-container">
        <div class="card" id="windows-card">
            <h2>Windows</h2>
            <p>Requires Windows 10 or 11</p>
            <a href="https://github.com/YOUR_USERNAME/YOUR_REPO/releases/download/v1.0.0/app.exe" class="btn btn-windows">Download .EXE</a>
        </div>

        <div class="card" id="linux-card">
            <h2>Linux (Debian/Ubuntu)</h2>
            <p>Compatible with Ubuntu, Debian, Mint</p>
            <a href="https://github.com/YOUR_USERNAME/YOUR_REPO/releases/download/v1.0.0/app.deb" class="btn btn-linux">Download .DEB</a>
        </div>
    </main>

    <footer>
        <p>© 2026 My Java App Project. Built with Java.</p>
    </footer>

    <script>
        // Simple OS detection to highlight the primary download button
        const os = navigator.userAgent.toLowerCase();
        if (os.includes('win')) {
            document.getElementById('windows-card').classList.add('highlight');
        } else if (os.includes('linux') || os.includes('ubuntu') || os.includes('debian')) {
            document.getElementById('linux-card').classList.add('highlight');
        }
    </script>
</body>
</html>
